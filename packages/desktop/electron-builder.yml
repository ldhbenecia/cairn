appId: io.cairn.desktop
productName: cairn
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../core/dist
    to: core/dist
mac:
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
        - x64
asar: true
