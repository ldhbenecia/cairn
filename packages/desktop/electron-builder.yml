appId: io.cairn.desktop
afterPack: scripts/adhoc-sign.cjs
productName: Cairn
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
  - '!**/node_modules/@anthropic-ai/**'
extraResources:
  - from: ../core/dist/bundle
    to: core/bundle
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
asar: true
publish:
  provider: github
  owner: ldhbenecia
  repo: cairn
