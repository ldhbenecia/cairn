appId: io.cairn.desktop
productName: cairn
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../core/dist/bundle
    to: core/bundle
mac:
  category: public.app-category.productivity
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
asar: true
publish:
  provider: github
  owner: ldhbenecia
  repo: cairn
