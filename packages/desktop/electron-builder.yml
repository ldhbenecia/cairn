appId: io.cairn.desktop
afterPack: scripts/adhoc-sign.cjs
productName: Cairn
# cairn:// 딥링크 (Shortcuts/Raycast 퀵 캡처) — macOS 는 Info.plist 선언이 있어야 스킴이 열린다
protocols:
  - name: Cairn
    schemes:
      - cairn
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../core/dist/bundle
    to: core/bundle
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
asar: true
publish:
  provider: github
  owner: ldhbenecia
  repo: cairn
