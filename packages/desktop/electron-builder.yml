appId: io.cairn.desktop
productName: cairn
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../core/dist/bundle
    to: core/bundle
mac:
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
asar: true
