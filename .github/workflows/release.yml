name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build · Publish (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}' (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Validate tag == workspace version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ROOT="$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "$ROOT" ]]; then
            echo "Tag $TAG != workspace version $ROOT — bump root package.json or fix tag"
            exit 1
          fi

      - name: Build + publish (inject workspace version)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROOT="$(node -p "require('./package.json').version")"
          pnpm --filter @cairn/core build:bundle
          pnpm --filter @cairn/desktop exec electron-vite build
          pnpm --filter @cairn/desktop exec electron-builder --publish always --config.extraMetadata.version="$ROOT"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes (git-cliff → draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git-cliff --latest --strip all -o RELEASE_NOTES.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
