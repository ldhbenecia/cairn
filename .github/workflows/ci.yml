name: CI

on:
  pull_request:
  push:
    branches: [main]

# 같은 브랜치에 커밋 연속 push 시 이전 실행 취소 (main 은 push 마다 온전히 검증)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm lint
      - name: Lint (web)
        run: pnpm --filter @cairn/web lint
      - name: Test
        run: pnpm -r test
      - name: Build (desktop)
        run: pnpm --filter @cairn/desktop build
