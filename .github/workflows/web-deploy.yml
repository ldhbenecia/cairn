name: Web Deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    paths:
      - 'packages/web/**'
      - '.github/workflows/web-deploy.yml'

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Resolve target environment
        id: env
        run: echo "target=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}" >> "$GITHUB_OUTPUT"
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
