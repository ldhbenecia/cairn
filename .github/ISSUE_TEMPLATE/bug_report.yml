name: 버그 리포트
description: 동작이 이상하거나 오류가 났을 때
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        한국어/영어 모두 괜찮아요. 토큰·이메일·절대경로·회사 코드 같은 민감정보는 붙여넣지 말아주세요.
  - type: textarea
    id: what
    attributes:
      label: 무슨 일이 있었나요
      description: 증상과, 기대했던 동작
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 절차
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: version
    attributes:
      label: 앱 버전
      placeholder: '예: 0.2.4'
  - type: input
    id: os
    attributes:
      label: OS / 환경
      placeholder: '예: macOS 15.2 (Apple Silicon)'
  - type: textarea
    id: extra
    attributes:
      label: 추가 정보 (선택)
      description: 스크린샷 등. 로그는 민감정보를 지운 뒤 첨부해주세요.
