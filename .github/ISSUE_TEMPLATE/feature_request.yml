name: 기능 제안
description: 새 기능이나 개선 아이디어
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        한국어/영어 모두 괜찮아요.
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 어떤 기능 / 개선을 원하시나요
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 왜 필요한가요
      description: 어떤 문제나 불편을 풀려는 건지
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 고려해본 다른 방법이 있다면
