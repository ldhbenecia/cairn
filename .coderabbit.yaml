language: ko-KR
tone_instructions: >-
  Write all review output in Korean. Take the perspective of a senior backend
  engineer. Prioritize substantive issues (bugs, races, compatibility, security)
  over style nits, and keep comments concise.
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - '!**/dist/**'
    - '!**/out/**'
    - '!**/*.lock'
    - '!pnpm-lock.yaml'
  path_instructions:
    - path: packages/core/**
      instructions: >-
        NestJS standalone engine. No external egress — never send code bodies,
        diffs, absolute paths, tokens, or identifiers to Claude/Notion/GitHub
        (.claude/rules/security-egress.md, ADR 0003/0021, fail-closed
        assertNoForbiddenPayload). Dates/times use the machine-local timezone
        (.claude/rules/timezone.md) — no KST/UTC assumptions, no hardcoded +9.
        No barrel index.ts; import from concrete paths.
    - path: packages/desktop/**
      instructions: >-
        Electron + React + Tailwind v4. Watch for publish-progress/session-state
        races, IPC broadcast issues, and listener leaks. The source of truth for
        stats is the local ~/.cairn/worklog-stats.json (ADR 0027) — do not depend
        on Notion properties.
chat:
  auto_reply: true
